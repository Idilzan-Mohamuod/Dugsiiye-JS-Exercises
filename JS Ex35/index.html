<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Modifying Element Attributes and Styles & Dark mode</title>
</head>
<style>

        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f4f6f9;
            color: #333333;
            transition: background-color 0.3s ease, color 0.3s ease; 
        }

        
        .app-container {
            max-width: 450px;
            width: 90%;
            padding: 2.5rem;
            background-color: #85c4f8;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
        }

        
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 10px;
        }

      
        .btn {
            padding: 10px 18px;
            font-size: 0.9rem;
            font-weight: 500;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background-color: #ffffff;
            color: #1a202c;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background-color: #f7fafc;
            border-color: #cbd5e0;
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }
</style>
<body>
   <div class="app-container">
        
        <img id="image" src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?q=80&w=872&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Image" width="200">
        
        <div class="button-group">
            <button class="btn" onclick="changeImage()">Change Image</button>
            <button class="btn" onclick="setLightMode()">Change LightMode</button>
            <button class="btn" onclick="setDarkMode()">Change DarkMode</button> 
        </div>

    </div>

    <script src="Ex35.js"></script>

</body>
</html>
