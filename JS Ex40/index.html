<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

<div class="video-player">
    <div class="video-container">
        <video id="video" src="your-video-file.mp4"></video>
    </div>

    <div class="video-info">
        <h2 id="title">Video Title</h2>
    </div>

    <div class="progress-container">
        <div class="progress-bar">
            <div class="progress"></div>
        </div>
        <div class="time">
            <span id="current-time">0:00</span>
            <span id="duration">0:00</span>  
        </div>
    </div>
    
    <div class="controls">
        <button id="prev" class="control-btn"><i class="fas fa-step-backward"></i></button>
        <button id="play" class="control-btn play-btn"><i class="fas fa-play"></i></button>
        <button id="next" class="control-btn"><i class="fas fa-step-forward"></i></button>
        <button id="fullscreen" class="control-btn"><i class="fas fa-expand"></i></button>
    </div>

    <div class="additional-controls">
        <div class="volume-container">
            <i class="fas fa-volume-up"></i>
            <input type="range" name="volume" id="volume" min="0" max="1" step="0.1" value="1">
        </div>

        <div class="speed-container">
            <i class="fas fa-tachometer-alt"></i>
            <select name="speed" id="speed">
                <option value="0.5">0.5x</option>
                <option value="1" selected>1x</option>
                <option value="2">2x</option>
            </select>
        </div>
    </div>
</div>

<script src="Ex40.js"></script>
</body>
</html>
